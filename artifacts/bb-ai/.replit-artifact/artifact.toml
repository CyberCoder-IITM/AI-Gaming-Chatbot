kind = "web"
previewPath = "/"
title = "BB AI"
version = "1.0.0"
id = "artifacts/bb-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25562

[services.development]
run = "pnpm --filter @workspace/bb-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bb-ai", "run", "build" ]
publicDir = "artifacts/bb-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25562"
BASE_PATH = "/"
